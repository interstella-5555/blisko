appId: com.blisko.app
---
# Onboarding E2E — v4 3-step flow (BLI-292)
# Login → Hook → Step 1 (name + one question + photo) → Step 2 (category tiles)
# → Step 3 (visibility) → AI generation → W okolicy
#
# Numberless flow: steps are matched by testID (DotsProgress shows no "Krok N").
# Photo: tapped via the system Photos picker. If the picker / permission dialog
# differs by sim, the optional runFlow blocks degrade gracefully.
#
# When you edit this flow you MUST mirror it in onboarding-ua.yaml (e2e/pl-ua-parity).

- runFlow: sub-flows/launch-and-dismiss-dev.yaml

# --- AUTH: Email login with dev shortcut ---

- extendedWaitUntil:
    visible: "(?i)Kontynuuj z Email"
    timeout: 30000
- tapOn: "(?i)Kontynuuj z Email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputRandomNumber
- inputText: "@example.com"
- tapOn:
    point: "50%,10%"
- tapOn:
    id: "send-link-button"

# --- INTRO CAROUSEL: 3 "how it works" scenes → onboarding ---
# Swipe through the scenes via the "Dalej" button, then "Zaczynam" on the last.
# Auto-play may have already advanced the pager, so each step is conditional.

- runFlow:
    when:
      visible:
        id: "intro-next-button"
    commands:
      - tapOn:
          id: "intro-next-button"
- runFlow:
    when:
      visible:
        id: "intro-next-button"
    commands:
      - tapOn:
          id: "intro-next-button"
- runFlow:
    when:
      visible:
        id: "intro-start-button"
    commands:
      - tapOn:
          id: "intro-start-button"
- runFlow:
    when:
      visible:
        id: "intro-skip-button"
    commands:
      - tapOn:
          id: "intro-skip-button"

# --- STEP 1: Name + conversational question + photo + age ---

- extendedWaitUntil:
    visible:
      id: "name-input"
    timeout: 30000
- tapOn:
    id: "name-input"
- eraseText: 30
- inputText: "Test User E2E"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

- tapOn:
    id: "intro-input"
- inputText: "Programista, gram na gitarze i biegam po parku. Szukam ludzi do projektow"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

# Photo (mandatory). Open the system Photos picker and pick the first image.
- tapOn:
    id: "onboarding-photo-button"
- runFlow:
    when:
      visible: "(?i)Allow Access to All Photos|Select Photos|Dozwól"
    commands:
      - tapOn: "(?i)Allow Access to All Photos|Dozwól"
- runFlow:
    when:
      visible: "(?i)Photos|Zdjęcia|Recents"
    commands:
      - tapOn:
          point: "20%,30%"
- waitForAnimationToEnd

- tapOn:
    id: "age-confirm-toggle"

- extendedWaitUntil:
    visible:
      id: "onboarding-step1-next"
    timeout: 10000
- tapOn:
    id: "onboarding-step1-next"

# --- STEP 2: Category tiles "Czego szukasz dziś?" ---

- extendedWaitUntil:
    visible:
      id: "onboarding-category-project"
    timeout: 15000
- tapOn:
    id: "onboarding-category-project"
- tapOn:
    id: "onboarding-category-networking"
- tapOn:
    id: "onboarding-status-input"
- inputText: "szukam ludzi do wspolnych projektow"
- tapOn:
    point: "50%,10%"
- tapOn:
    id: "onboarding-categories-next"

# --- STEP 3: Account visibility ---

- extendedWaitUntil:
    visible:
      id: "onboarding-visibility-semi_open"
    timeout: 15000
- tapOn:
    id: "onboarding-visibility-semi_open"
- tapOn:
    id: "onboarding-go-to-map"

# --- VERIFY: AI generation finishes and we land on the map ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 600000
- assertVisible:
    id: "set-status-pill"
