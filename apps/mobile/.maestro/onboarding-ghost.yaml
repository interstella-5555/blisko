appId: com.blisko.app
---
# Ghost Profile Onboarding E2E Test
# Login → Hook → Name+Age → Ghost profile → W okolicy
# Fast, deterministic — no AI involved

- runFlow: sub-flows/launch-and-dismiss-dev.yaml

# --- AUTH: Email login with dev shortcut ---

- extendedWaitUntil:
    visible: "(?i)Kontynuuj z Email"
    timeout: 30000
- tapOn: "(?i)Kontynuuj z Email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputRandomNumber
- inputText: "@example.com"
- tapOn:
    point: "50%,10%"
- tapOn: "(?i)Wyślij kod"

# --- HOOK SCREEN (auto-advances in 5s) ---
# Tap to skip if still showing, otherwise wait for Krok 1

- runFlow:
    when:
      visible:
        id: "hook-start-button"
    commands:
      - tapOn:
          id: "hook-start-button"

# --- STEP 1: Name + Age ---

- extendedWaitUntil:
    visible: "Krok 1"
    timeout: 30000

- tapOn:
    id: "name-input"
- eraseText: 30
- inputText: "Ghost User E2E"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

- tapOn:
    id: "age-confirm-toggle"

- extendedWaitUntil:
    visible: "(?i)Dalej"
    timeout: 5000
- tapOn: "(?i)Dalej"

# --- STEP 2: Visibility — choose ghost profile ---

- extendedWaitUntil:
    visible:
      id: "ghost-option"
    timeout: 10000
- tapOn:
    id: "ghost-option"
- tapOn:
    id: "ghost-profile-button"

# --- VERIFY: Landed on main tab ---

- extendedWaitUntil:
    visible: "W okolicy"
    timeout: 30000

- assertVisible: "W okolicy"
