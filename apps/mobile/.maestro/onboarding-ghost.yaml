appId: com.blisko.app
---
# Onboarding E2E — Ninja ("ghost") visibility path, v4 3-step flow (BLI-292)
# Login → Hook → Step 1 → Step 2 (categories) → Step 3 (pick Ninja) → map.
# In v4 the ghost path is the Ninja visibility choice in the account-visibility
# step — there is no separate ghost fork. Still goes through AI generation.
#
# When you edit this flow you MUST mirror it in onboarding-ghost-ua.yaml
# (e2e/pl-ua-parity).

- runFlow: sub-flows/launch-and-dismiss-dev.yaml

# --- AUTH: Email login with dev shortcut ---

- extendedWaitUntil:
    visible: "(?i)Kontynuuj z Email"
    timeout: 30000
- tapOn: "(?i)Kontynuuj z Email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputRandomNumber
- inputText: "@example.com"
- tapOn:
    point: "50%,10%"
- tapOn: "(?i)Wyślij kod"

# --- INTRO CAROUSEL: 3 "how it works" scenes → onboarding ---
# Swipe through the scenes via the "Dalej" button, then "Zaczynam" on the last.
# Auto-play may have already advanced the pager, so each step is conditional.

- runFlow:
    when:
      visible:
        id: "intro-next-button"
    commands:
      - tapOn:
          id: "intro-next-button"
- runFlow:
    when:
      visible:
        id: "intro-next-button"
    commands:
      - tapOn:
          id: "intro-next-button"
- runFlow:
    when:
      visible:
        id: "intro-start-button"
    commands:
      - tapOn:
          id: "intro-start-button"
- runFlow:
    when:
      visible:
        id: "intro-skip-button"
    commands:
      - tapOn:
          id: "intro-skip-button"

# --- STEP 1: Name + conversational question + photo + age ---

- extendedWaitUntil:
    visible:
      id: "name-input"
    timeout: 30000
- tapOn:
    id: "name-input"
- eraseText: 30
- inputText: "Ghost User E2E"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

- tapOn:
    id: "intro-input"
- inputText: "Programista, gram na gitarze. Wolę najpierw się rozejrzeć"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

# Photo (mandatory). Open the system Photos picker and pick the first image.
- tapOn:
    id: "onboarding-photo-button"
- runFlow:
    when:
      visible: "(?i)Allow Access to All Photos|Select Photos|Dozwól"
    commands:
      - tapOn: "(?i)Allow Access to All Photos|Dozwól"
- runFlow:
    when:
      visible: "(?i)Photos|Zdjęcia|Recents"
    commands:
      - tapOn:
          point: "20%,30%"
- waitForAnimationToEnd

- tapOn:
    id: "age-confirm-toggle"

- extendedWaitUntil:
    visible:
      id: "onboarding-step1-next"
    timeout: 10000
- tapOn:
    id: "onboarding-step1-next"

# --- STEP 2: Category tiles ---

- extendedWaitUntil:
    visible:
      id: "onboarding-category-casual"
    timeout: 15000
- tapOn:
    id: "onboarding-category-casual"
- tapOn:
    id: "onboarding-categories-next"

# --- STEP 3: Account visibility — pick Ninja ---

- extendedWaitUntil:
    visible:
      id: "onboarding-visibility-ninja"
    timeout: 15000
- tapOn:
    id: "onboarding-visibility-ninja"
- tapOn:
    id: "onboarding-go-to-map"

# --- VERIFY: Landed on the map ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 600000
- assertVisible:
    id: "set-status-pill"
