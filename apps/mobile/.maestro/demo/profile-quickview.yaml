appId: com.blisko.app
# Profile quick-view E2E — demo-critical (BLI-300)
# Seed mode: nearby — user A (logged in) + user B in A's nearby list.
# A opens the nearby list and taps B to open the profile modal. Verifies the
# quick-view modal renders (name + bio) — was never opened in any test. Run via:
#   ./run-test.sh profile-quickview.yaml nearby
#
# When you edit this flow you MUST mirror it in profile-quickview-ua.yaml
# (e2e/pl-ua-parity).
---
- runFlow: ../sub-flows/login-seeded.yaml

# --- Open the nearby list sheet ---

- extendedWaitUntil:
    visible:
      id: "nearby-count-pill"
    timeout: 20000
- tapOn:
    id: "nearby-count-pill"

# --- Tap seeded peer B to open the profile quick-view ---

- extendedWaitUntil:
    visible: "${DISPLAY_NAME_B}"
    timeout: 15000
- tapOn: "${DISPLAY_NAME_B}"

# --- VERIFY: the profile modal opened with B's details ---

- extendedWaitUntil:
    visible:
      id: "profile-display-name"
    timeout: 15000
- assertVisible: "${DISPLAY_NAME_B}"
- assertVisible: "(?i)O mnie"
