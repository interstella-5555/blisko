appId: com.blisko.app
---
# Shared sub-flow: fresh @example.com login + v4 ghost (Ninja) onboarding (PL).
# Lands on the map ("W okolicy") with a complete, hidden profile. Used by the
# fresh demo flows (map-render, set-status) that only assert on the user's own
# map UI and don't need a seeded peer.
#
# Mirrors onboarding-ghost.yaml. When that flow changes, mirror here.

- runFlow: launch-and-dismiss-dev.yaml

# --- AUTH: Email login with dev shortcut ---

- extendedWaitUntil:
    visible: "(?i)Kontynuuj z Email"
    timeout: 30000
- tapOn: "(?i)Kontynuuj z Email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputRandomNumber
- inputText: "@example.com"
- tapOn:
    point: "50%,10%"
- tapOn: "(?i)Wyślij kod"

# --- INTRO CAROUSEL: skip straight to onboarding ---

- runFlow:
    when:
      visible:
        id: "intro-next-button"
    commands:
      - tapOn:
          id: "intro-next-button"
- runFlow:
    when:
      visible:
        id: "intro-next-button"
    commands:
      - tapOn:
          id: "intro-next-button"
- runFlow:
    when:
      visible:
        id: "intro-start-button"
    commands:
      - tapOn:
          id: "intro-start-button"
- runFlow:
    when:
      visible:
        id: "intro-skip-button"
    commands:
      - tapOn:
          id: "intro-skip-button"

# --- STEP 1: Name + conversational question + photo + age ---

- extendedWaitUntil:
    visible:
      id: "name-input"
    timeout: 30000
- tapOn:
    id: "name-input"
- eraseText: 30
- inputText: "Demo Fresh E2E"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

- tapOn:
    id: "intro-input"
- inputText: "Programista, gram na gitarze i biegam po parku. Szukam ludzi do projektow"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

- tapOn:
    id: "onboarding-photo-button"
- runFlow:
    when:
      visible: "(?i)Allow Access to All Photos|Select Photos|Dozwól"
    commands:
      - tapOn: "(?i)Allow Access to All Photos|Dozwól"
- runFlow:
    when:
      visible: "(?i)Photos|Zdjęcia|Recents"
    commands:
      - tapOn:
          point: "20%,30%"
- waitForAnimationToEnd

- tapOn:
    id: "age-confirm-toggle"

# Gender is a required Step-1 field (BLI-306); pick one so "Dalej" un-gates.
- tapOn:
    id: "gender-female"

- extendedWaitUntil:
    visible:
      id: "onboarding-step1-next"
    timeout: 10000
- tapOn:
    id: "onboarding-step1-next"

# --- STEP 2: Category tiles ---

- extendedWaitUntil:
    visible:
      id: "onboarding-category-casual"
    timeout: 15000
- tapOn:
    id: "onboarding-category-casual"
- tapOn:
    id: "onboarding-categories-next"

# --- STEP 3: Account visibility — pick Ninja (ghost) ---

- extendedWaitUntil:
    visible:
      id: "onboarding-visibility-ninja"
    timeout: 15000
- tapOn:
    id: "onboarding-visibility-ninja"
- tapOn:
    id: "onboarding-go-to-map"

# --- Land on the map ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 600000
