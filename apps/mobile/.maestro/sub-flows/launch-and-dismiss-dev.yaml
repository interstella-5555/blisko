appId: com.blisko.app
---
# Launch app and optionally connect to dev server
# Local (default): connects to Metro, dismisses dev menus
# CI: pass -e RELEASE_BUILD=true to skip dev launcher steps

- launchApp:
    clearState: true
    permissions:
      all: allow

# Set simulated location (Warsaw) early — before app mounts tabs
- setLocation:
    latitude: 52.2297
    longitude: 21.0122

- runFlow:
    when:
      true: ${RELEASE_BUILD != 'true'}
    file: dismiss-dev-menus.yaml
