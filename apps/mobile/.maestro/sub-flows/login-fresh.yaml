appId: com.blisko.app
---
# Login with random @example.com email + ghost onboarding
# After this flow: user lands on "W okolicy" tab
# Uses ghost profile for speed — tests calling this care about post-onboarding features

- runFlow: ../sub-flows/launch-and-dismiss-dev.yaml

# --- AUTH ---

- extendedWaitUntil:
    visible: "(?i)Kontynuuj z Email"
    timeout: 30000
- tapOn: "(?i)Kontynuuj z Email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputRandomNumber
- inputText: "@example.com"
- hideKeyboard
- tapOn: "(?i)Wyślij kod"

# --- HOOK (auto-advances in 5s) ---

- runFlow:
    when:
      visible:
        id: "hook-start-button"
    commands:
      - tapOn:
          id: "hook-start-button"

# --- ONBOARDING: Name + Age ---

- extendedWaitUntil:
    visible: "Krok 1"
    timeout: 30000
- tapOn:
    id: "name-input"
- eraseText: 30
- inputText: "Test User"
- hideKeyboard
- waitForAnimationToEnd
- tapOn:
    id: "age-confirm-toggle"
- tapOn: "(?i)Dalej"

# --- ONBOARDING: Ghost profile ---

- extendedWaitUntil:
    visible:
      id: "ghost-profile-button"
    timeout: 10000
- tapOn:
    id: "ghost-profile-button"

# --- VERIFY ---

- extendedWaitUntil:
    visible: "W okolicy"
    timeout: 30000
