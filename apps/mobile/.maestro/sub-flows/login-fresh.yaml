appId: com.blisko.app
---
# Login with random @example.com email + ghost onboarding
# After this flow: user lands on "W okolicy" tab
# Uses ghost profile for speed — tests calling this care about post-onboarding features

- runFlow: ../sub-flows/launch-and-dismiss-dev.yaml

# --- AUTH ---

- extendedWaitUntil:
    visible: "(?i)Kontynuuj z Email"
    timeout: 30000
- tapOn: "(?i)Kontynuuj z Email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputRandomNumber
- inputText: "@example.com"
- tapOn:
    point: "50%,10%"
- tapOn: "(?i)Wyślij kod"

# --- INTRO CAROUSEL: skip straight to onboarding ---

- runFlow:
    when:
      visible:
        id: "intro-skip-button"
    commands:
      - tapOn:
          id: "intro-skip-button"

# --- ONBOARDING: Name + Age ---

- extendedWaitUntil:
    visible: "Krok 1"
    timeout: 30000
- tapOn:
    id: "name-input"
- eraseText: 30
- inputText: "Test User"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd
- tapOn:
    id: "age-confirm-toggle"
- tapOn: "(?i)Dalej"

# --- ONBOARDING: Ghost profile ---

- extendedWaitUntil:
    visible:
      id: "ghost-option"
    timeout: 10000
- tapOn:
    id: "ghost-option"
- tapOn:
    id: "ghost-profile-button"

# --- VERIFY ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 30000
