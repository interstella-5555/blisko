appId: com.blisko.app
---
# Onboarding E2E — v4 3-step flow, Ukrainian locale (BLI-292)
# Mirrors `onboarding.yaml`. First taps the `UA` LocalePill to switch the UI,
# then runs the same testID-driven steps. Strings come from the bundle (UA), so
# inputText stays ASCII per the Maestro Cyrillic-input limitation (e2e rules).
#
# When you edit `onboarding.yaml` you MUST mirror the change here (e2e/pl-ua-parity).

- runFlow: sub-flows/launch-and-dismiss-dev.yaml

# --- Switch UI language to UA ---

- extendedWaitUntil:
    visible:
      id: "locale-pill-ua"
    timeout: 10000
- tapOn:
    id: "locale-pill-ua"

# --- AUTH: Email login with dev shortcut ---

- extendedWaitUntil:
    visible: "(?i)Продовжити з Email"
    timeout: 30000
- tapOn: "(?i)Продовжити з Email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputRandomNumber
- inputText: "@example.com"
- tapOn:
    point: "50%,10%"
- tapOn:
    id: "send-link-button"

# --- HOOK SCREEN (auto-advances in 5s) ---

- runFlow:
    when:
      visible:
        id: "hook-start-button"
    commands:
      - tapOn:
          id: "hook-start-button"

# --- STEP 1: Name + conversational question + photo + age ---

- extendedWaitUntil:
    visible:
      id: "name-input"
    timeout: 30000
- tapOn:
    id: "name-input"
- eraseText: 30
- inputText: "Test User E2E"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

- tapOn:
    id: "intro-input"
- inputText: "Programista, gram na gitarze i biegam po parku. Szukam ludzi do projektow"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

# Photo (mandatory). Open the system Photos picker and pick the first image.
- tapOn:
    id: "onboarding-photo-button"
- runFlow:
    when:
      visible: "(?i)Allow Access to All Photos|Select Photos|Дозволити"
    commands:
      - tapOn: "(?i)Allow Access to All Photos|Дозволити"
- runFlow:
    when:
      visible: "(?i)Photos|Фото|Recents"
    commands:
      - tapOn:
          point: "20%,30%"
- waitForAnimationToEnd

- tapOn:
    id: "age-confirm-toggle"

- extendedWaitUntil:
    visible:
      id: "onboarding-step1-next"
    timeout: 10000
- tapOn:
    id: "onboarding-step1-next"

# --- STEP 2: Category tiles "Чого ти шукаєш сьогодні?" ---

- extendedWaitUntil:
    visible:
      id: "onboarding-category-project"
    timeout: 15000
- tapOn:
    id: "onboarding-category-project"
- tapOn:
    id: "onboarding-category-networking"
- tapOn:
    id: "onboarding-status-input"
- inputText: "szukam ludzi do wspolnych projektow"
- tapOn:
    point: "50%,10%"
- tapOn:
    id: "onboarding-categories-next"

# --- STEP 3: Account visibility ---

- extendedWaitUntil:
    visible:
      id: "onboarding-visibility-semi_open"
    timeout: 15000
- tapOn:
    id: "onboarding-visibility-semi_open"
- tapOn:
    id: "onboarding-go-to-map"

# --- VERIFY: AI generation finishes and we land on the map ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 600000
- assertVisible:
    id: "set-status-pill"
