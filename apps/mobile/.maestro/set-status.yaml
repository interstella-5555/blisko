appId: com.blisko.app
---
# Set status E2E — demo-critical (BLI-300)
# "Co teraz?" — broadcasting a live status is the core ambient loop. This flow
# opens the set-status sheet from the map's + action, picks a category, types a
# status and submits, then verifies it persisted by reopening the sheet — the
# input comes back prefilled with the status we just set.
#
# When you edit this flow you MUST mirror it in set-status-ua.yaml
# (e2e/pl-ua-parity).

- runFlow: sub-flows/onboard-ghost-pl.yaml

# --- Open the set-status sheet from the + action ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 15000
- tapOn:
    id: "set-status-pill"

# --- Pick a category + type a status ---

- extendedWaitUntil:
    visible:
      id: "status-category-networking"
    timeout: 10000
- tapOn:
    id: "status-category-networking"
- tapOn:
    id: "status-input"
- inputText: "Szukam ludzi do wspolnego biegania o poranku"
- hideKeyboard
- tapOn:
    id: "status-submit-button"

# --- VERIFY: the status persisted — reopening the sheet shows it prefilled ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 15000
- tapOn:
    id: "set-status-pill"
- extendedWaitUntil:
    visible:
      id: "status-input"
    timeout: 10000
- assertVisible:
    id: "status-input"
    text: ".*Szukam ludzi do wspolnego biegania.*"
