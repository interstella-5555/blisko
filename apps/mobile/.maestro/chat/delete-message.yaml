appId: com.blisko.app
---
# Task 27: Delete a message
# Seeded user long-presses own message and deletes it
# Seed mode: messages (10 messages in conversation)
# Run via: ./run-test.sh delete-message.yaml messages

- runFlow: ../sub-flows/login-seeded.yaml

# Navigate to Czaty tab
- tapOn: "tab-chats"

# Open conversation
- extendedWaitUntil:
    visible:
      id: "conversation-row"
    timeout: 15000
- tapOn:
    id: "conversation-row"

# Wait for messages to load
- extendedWaitUntil:
    visible:
      id: "message-bubble"
    timeout: 10000

# Seed mode 'messages' has User A sending "Jasne, do zobaczenia!"
# (9th message, alternating A,B starting with A → index 8 by A)
# We're logged in as User A, so it's our message and deletable
- extendedWaitUntil:
    visible: ".*Jasne, do zobaczenia.*"
    timeout: 5000

# Long-press on our own message bubble
- longPressOn: ".*Jasne, do zobaczenia.*"

# "Usuń" is in the context menu (isMine = true for messages we sent)
- extendedWaitUntil:
    visible: "Usuń"
    timeout: 5000
- tapOn: "Usuń"

# Confirm deletion in the Alert dialog
- extendedWaitUntil:
    visible: "Czy na pewno chcesz usunąć tę wiadomość?"
    timeout: 5000
- tapOn: "Usuń"

# Verify deleted message placeholder appears
- extendedWaitUntil:
    visible: "Wiadomość usunięta"
    timeout: 10000
