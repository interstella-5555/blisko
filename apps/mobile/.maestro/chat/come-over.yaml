appId: com.blisko.app
# BLI-298: "Podejdę osobiście" come-over button (live, gated Full Nomad + <500m).
# Seed mode: comeover — user A is Full Nomad, B is ~70m away → button is eligible.
# Run via: ./run-test.sh come-over.yaml comeover
---
- runFlow: ../sub-flows/login-seeded.yaml

# Navigate to Czaty tab
- tapOn: "tab-chats"

# Open the seeded conversation
- extendedWaitUntil:
    visible:
      id: "conversation-row"
    timeout: 15000
- tapOn:
    id: "conversation-row"

# Wait for chat screen
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000

# The come-over button appears only when eligible (Full Nomad + peer < 500m).
- extendedWaitUntil:
    visible:
      id: "come-over-btn"
    timeout: 15000
- tapOn:
    id: "come-over-btn"

# Confirmation toast: "Super! {imię} wie, że idziesz."
- extendedWaitUntil:
    visible: ".*wie, że idziesz.*"
    timeout: 10000
