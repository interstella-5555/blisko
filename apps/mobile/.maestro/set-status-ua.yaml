appId: com.blisko.app
---
# Set status E2E — demo-critical, UA locale (BLI-300)
# Mirrors set-status.yaml. Onboards via the UA ghost sub-flow, then drives the
# set-status sheet by testID. The typed status stays ASCII (Maestro Cyrillic
# input limitation) — we assert the prefilled input by testID + the typed text
# we control, not a bundle UA string.
#
# When you edit set-status.yaml you MUST mirror the change here
# (e2e/pl-ua-parity).

- runFlow: sub-flows/onboard-ghost-ua.yaml

# --- Open the set-status sheet from the + action ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 15000
- tapOn:
    id: "set-status-pill"

# --- Pick a category + type a status ---

- extendedWaitUntil:
    visible:
      id: "status-category-networking"
    timeout: 10000
- tapOn:
    id: "status-category-networking"
- tapOn:
    id: "status-input"
- inputText: "Szukam ludzi do wspolnego biegania o poranku"
- hideKeyboard
- tapOn:
    id: "status-submit-button"

# --- VERIFY: the status persisted — reopening the sheet shows it prefilled ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 15000
- tapOn:
    id: "set-status-pill"
- extendedWaitUntil:
    visible:
      id: "status-input"
    timeout: 10000
- assertVisible:
    id: "status-input"
    text: ".*Szukam ludzi do wspolnego biegania.*"
