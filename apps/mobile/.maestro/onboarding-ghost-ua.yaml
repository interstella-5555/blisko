appId: com.blisko.app
---
# Ghost Profile Onboarding E2E Test — Ukrainian locale
# Mirrors `onboarding-ghost.yaml` flow but in UA. First step taps the `UA`
# button on the LocalePill to switch the UI before logging in. Every
# assertion / tap uses the UA translation from
# `apps/mobile/src/locales/ua/messages.po`.
#
# When you edit `onboarding-ghost.yaml` you MUST mirror the change here.
# See `.claude/rules/e2e.md` for the PL/UA parity convention.

- runFlow: sub-flows/launch-and-dismiss-dev.yaml

# --- Switch UI language to UA ---

- extendedWaitUntil:
    visible:
      id: "locale-pill-ua"
    timeout: 10000
- tapOn:
    id: "locale-pill-ua"

# --- AUTH: Email login with dev shortcut ---

- extendedWaitUntil:
    visible: "(?i)Продовжити з Email"
    timeout: 30000
- tapOn: "(?i)Продовжити з Email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputRandomNumber
- inputText: "@example.com"
- tapOn:
    point: "50%,10%"
- tapOn: "(?i)Надіслати код"

# --- HOOK SCREEN (auto-advances in 5s) ---
# Tap to skip if still showing, otherwise wait for Krok 1

- runFlow:
    when:
      visible:
        id: "hook-start-button"
    commands:
      - tapOn:
          id: "hook-start-button"

# --- STEP 1: Name + Age ---

- extendedWaitUntil:
    visible: "Крок 1"
    timeout: 30000

- tapOn:
    id: "name-input"
- eraseText: 30
- inputText: "Ghost User E2E"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

- tapOn:
    id: "age-confirm-toggle"

- extendedWaitUntil:
    visible: "(?i)Далі"
    timeout: 5000
- tapOn: "(?i)Далі"

# --- STEP 2: Visibility — choose ghost profile ---

- extendedWaitUntil:
    visible:
      id: "ghost-option"
    timeout: 10000
- tapOn:
    id: "ghost-option"
- tapOn:
    id: "ghost-profile-button"

# --- VERIFY: Landed on main tab ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 30000

- assertVisible:
    id: "set-status-pill"
