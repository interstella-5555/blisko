appId: com.blisko.app
---
# Onboarding E2E — Ninja ("ghost") visibility path, UA locale, v4 3-step (BLI-292)
# Mirrors `onboarding-ghost.yaml`. Taps the `UA` LocalePill first, then runs the
# same testID-driven steps and picks Ninja in the account-visibility step.
#
# When you edit `onboarding-ghost.yaml` you MUST mirror the change here
# (e2e/pl-ua-parity).

- runFlow: sub-flows/launch-and-dismiss-dev.yaml

# --- Switch UI language to UA ---

- extendedWaitUntil:
    visible:
      id: "locale-pill-ua"
    timeout: 10000
- tapOn:
    id: "locale-pill-ua"

# --- AUTH: Email login with dev shortcut ---

- extendedWaitUntil:
    visible: "(?i)Продовжити з Email"
    timeout: 30000
- tapOn: "(?i)Продовжити з Email"

- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputRandomNumber
- inputText: "@example.com"
- tapOn:
    point: "50%,10%"
- tapOn: "(?i)Надіслати код"

# --- INTRO CAROUSEL: 3 "how it works" scenes → onboarding ---
# Swipe through the scenes via the "Dalej" button, then "Zaczynam" on the last.
# Auto-play may have already advanced the pager, so each step is conditional.

- runFlow:
    when:
      visible:
        id: "intro-next-button"
    commands:
      - tapOn:
          id: "intro-next-button"
- runFlow:
    when:
      visible:
        id: "intro-next-button"
    commands:
      - tapOn:
          id: "intro-next-button"
- runFlow:
    when:
      visible:
        id: "intro-start-button"
    commands:
      - tapOn:
          id: "intro-start-button"
- runFlow:
    when:
      visible:
        id: "intro-skip-button"
    commands:
      - tapOn:
          id: "intro-skip-button"

# --- STEP 1: Name + conversational question + photo + age ---

- extendedWaitUntil:
    visible:
      id: "name-input"
    timeout: 30000
- tapOn:
    id: "name-input"
- eraseText: 30
- inputText: "Ghost User E2E"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

- tapOn:
    id: "intro-input"
- inputText: "Programista, gram na gitarze. Wolę najpierw się rozejrzeć"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

# Photo (mandatory). Open the system Photos picker and pick the first image.
- tapOn:
    id: "onboarding-photo-button"
- runFlow:
    when:
      visible: "(?i)Allow Access to All Photos|Select Photos|Дозволити"
    commands:
      - tapOn: "(?i)Allow Access to All Photos|Дозволити"
- runFlow:
    when:
      visible: "(?i)Photos|Фото|Recents"
    commands:
      - tapOn:
          point: "20%,30%"
- waitForAnimationToEnd

- tapOn:
    id: "age-confirm-toggle"

- extendedWaitUntil:
    visible:
      id: "onboarding-step1-next"
    timeout: 10000
- tapOn:
    id: "onboarding-step1-next"

# --- STEP 2: Category tiles ---

- extendedWaitUntil:
    visible:
      id: "onboarding-category-casual"
    timeout: 15000
- tapOn:
    id: "onboarding-category-casual"
- tapOn:
    id: "onboarding-categories-next"

# --- STEP 3: Account visibility — pick Ninja ---

- extendedWaitUntil:
    visible:
      id: "onboarding-visibility-ninja"
    timeout: 15000
- tapOn:
    id: "onboarding-visibility-ninja"
- tapOn:
    id: "onboarding-go-to-map"

# --- VERIFY: Landed on the map ---

- extendedWaitUntil:
    visible:
      id: "set-status-pill"
    timeout: 600000
- assertVisible:
    id: "set-status-pill"
