name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run --filter '@repo/api' typecheck
      - run: bun run --filter '@repo/shared' typecheck
      - run: bun run --filter '@repo/mobile' typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run --filter '@repo/api' test
      - run: bun run --filter '@repo/shared' test

  mobile-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
      - run: bun install
      - name: Metro bundle check (iOS)
        working-directory: apps/mobile
        run: npx expo export --platform ios --output-dir /tmp/expo-bundle-check --no-bytecode
