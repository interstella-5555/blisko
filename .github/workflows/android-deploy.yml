name: Android Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "apps/api/**"
      - "apps/admin/**"
      - "apps/website/**"
      - "apps/design/**"
      - "apps/chatbot/**"
      - "packages/dev-cli/**"
      - "docs/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: android-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_IMGPROXY_URL: ${{ vars.EXPO_PUBLIC_IMGPROXY_URL }}
      GOOGLE_MAPS_ANDROID_API_KEY: ${{ vars.GOOGLE_MAPS_ANDROID_API_KEY }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
      BUNDLE_GEMFILE: ${{ github.workspace }}/apps/mobile/fastlane-android/Gemfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: bun.lock

      - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/mobile/fastlane-android

      - run: bun install

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install

      - name: Install Fastlane config into generated android/
        working-directory: apps/mobile
        run: cp -R fastlane-android android/fastlane

      - name: Decode upload keystore
        working-directory: apps/mobile/android/app
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload.keystore

      - name: Write Play Store service account
        working-directory: apps/mobile/android/fastlane
        run: printf '%s' "$PLAY_STORE_SERVICE_ACCOUNT_JSON" > play-service-account.json

      - name: Fastlane deploy
        working-directory: apps/mobile/android
        run: bundle exec fastlane deploy_internal

      - name: Cleanup secrets
        if: always()
        working-directory: apps/mobile/android
        run: |
          rm -f app/upload.keystore fastlane/play-service-account.json
