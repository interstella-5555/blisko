name: Android Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "apps/api/**"
      - "apps/admin/**"
      - "apps/website/**"
      - "apps/design/**"
      - "apps/chatbot/**"
      - "packages/dev-cli/**"
      - "docs/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: android-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      GOOGLE_MAPS_ANDROID_API_KEY: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: bun.lock

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - run: bun install

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install

      - name: Install Fastlane config into generated android/
        working-directory: apps/mobile
        run: cp -R fastlane-android android/fastlane

      - name: Decode upload keystore
        working-directory: apps/mobile/android/app
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload.keystore

      - name: Write Play Store service account
        working-directory: apps/mobile/android/fastlane
        run: printf '%s' "$PLAY_STORE_SERVICE_ACCOUNT_JSON" > play-service-account.json

      - name: Fastlane deploy
        working-directory: apps/mobile/android
        run: fastlane deploy_internal

      - name: Cleanup secrets
        if: always()
        working-directory: apps/mobile/android
        run: |
          rm -f app/upload.keystore fastlane/play-service-account.json
